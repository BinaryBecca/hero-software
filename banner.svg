<svg width="100%" viewBox="0 0 680 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Spaß mit Aufmaß — HERO Software voice measurement banner</title>
  <desc>Animated banner for the HERO Software hackathon project</desc>
  <defs>
    <style>
      .sweep { animation: sweep 3s ease-in-out infinite alternate; }
      @keyframes sweep {
        0%   { transform: translateX(-60px); opacity: 0.18; }
        100% { transform: translateX(60px);  opacity: 0.32; }
      }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.55; }
      }
      .slidein { animation: slidein 0.9s cubic-bezier(.22,1,.36,1) both; }
      @keyframes slidein {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect width="680" height="160" rx="12" fill="#0d0d0d"/>
  <rect class="sweep" x="0" y="0" width="260" height="160" rx="0" fill="#f7e004" opacity="0.22"/>
  <rect x="0" y="140" width="680" height="4" rx="0" fill="#f7e004" opacity="0.9"/>
  <rect x="0" y="144" width="680" height="1" rx="0" fill="#f7e004" opacity="0.3"/>

  <circle class="pulse" cx="38" cy="52" r="13" fill="none" stroke="#f7e004" stroke-width="2"/>
  <circle cx="38" cy="52" r="6" fill="#f7e004"/>
  <line x1="38" y1="65" x2="38" y2="75" stroke="#f7e004" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="72" x2="46" y2="72" stroke="#f7e004" stroke-width="2" stroke-linecap="round"/>

  <text class="slidein" x="64" y="58" font-family="sans-serif" font-size="26" font-weight="700" fill="#f7e004" letter-spacing="-0.5">Spaß mit Aufmaß</text>
  <text class="slidein" x="64" y="82" font-family="sans-serif" font-size="13" fill="#ffffff" opacity="0.75">Voice-powered measurements for craftsmen · Built for HERO Software · CheftreffAI Hackathon</text>

  <rect x="64" y="96" width="86" height="22" rx="4" fill="#f7e004"/>
  <text x="107" y="111" font-family="sans-serif" font-size="11" font-weight="700" fill="#0d0d0d" text-anchor="middle">React + Vite</text>

  <rect x="158" y="96" width="90" height="22" rx="4" fill="#1a1a1a" stroke="#f7e004" stroke-width="1"/>
  <text x="203" y="111" font-family="sans-serif" font-size="11" font-weight="600" fill="#f7e004" text-anchor="middle">Tailwind CSS</text>

  <rect x="256" y="96" width="80" height="22" rx="4" fill="#1a1a1a" stroke="#f7e004" stroke-width="1"/>
  <text x="296" y="111" font-family="sans-serif" font-size="11" font-weight="600" fill="#f7e004" text-anchor="middle">FastAPI</text>

  <rect x="344" y="96" width="60" height="22" rx="4" fill="#1a1a1a" stroke="#f7e004" stroke-width="1"/>
  <text x="374" y="111" font-family="sans-serif" font-size="11" font-weight="600" fill="#f7e004" text-anchor="middle">MIT</text>
</svg>
